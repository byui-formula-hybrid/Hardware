name: CI Pipeline

# Concurrency control - cancel previous runs when new commits are pushed
# This saves CI minutes by ensuring only the latest commit is tested
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.vscode/**'
      - '.scripts/README.md'
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.vscode/**'
      - '.scripts/README.md'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    env:
      PYTHON_VERSION: "3.14.3"
      PYENV_ROOT: "/home/manleymt/.pyenv"

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: [self-hosted, Linux]
          - os: macos
            runner: [self-hosted, macOS]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          clean: true
      - name: Check Python Version
        run: |
          # 1. Point PATH to the pyenv executable and shims
          export PATH="$PYENV_ROOT/bin:$PYENV_ROOT/shims:$PATH"
          
          # 2. Initialize pyenv
          eval "$(pyenv init -)"
          
          # 3. Set the shell to the specific version
          # We use the env variable defined above
          pyenv shell ${{ env.PYTHON_VERSION }}
          
          # 4. Perform the check
          CURRENT_VERSION=$(python3 --version)
          EXPECTED="Python ${{ env.PYTHON_VERSION }}"
          
          if [[ "$CURRENT_VERSION" != "$EXPECTED" ]]; then
            echo "------------------------------------------------"
            echo "ERROR: Version mismatch!"
            echo "Expected: $EXPECTED"
            echo "Found   : $CURRENT_VERSION"
            echo "------------------------------------------------"
            exit 1
          fi
          
          echo "Success: Found $CURRENT_VERSION"
          
          # 5. Crucial: Export shims to GITHUB_PATH so REUSE is possible in next steps
          echo "$PYENV_ROOT/shims" >> $GITHUB_PATH
          echo "$PYENV_ROOT/bin" >> $GITHUB_PATH
      - name: Install PlatformIO Core
        run: |
          python3 -m venv .venv
          source .venv/bin/activate || source .venv/Scripts/activate
          pip install --upgrade platformio
      - name: Build ESP32S3
        run: |
          source .venv/bin/activate || source .venv/Scripts/activate
          pio run -e ESP32S3 -t clean -vvv
          pio run -e ESP32S3 -vvv
      - name: Build STM32F7
        run: |
          source .venv/bin/activate || source .venv/Scripts/activate
          pio run -e STM32F7 -t clean -vvv
          pio run -e STM32F7 -vvv