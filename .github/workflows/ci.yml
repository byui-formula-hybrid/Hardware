name: CI Pipeline

# Concurrency control - cancel previous runs when new commits are pushed
# This saves CI minutes by ensuring only the latest commit is tested
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.vscode/**'
      - '.scripts/README.md'
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - '.vscode/**'
      - '.scripts/README.md'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    env:
      PYTHON_VERSION: "3.14.3"

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: [self-hosted, Linux]
          - os: macos
            runner: [self-hosted, macOS]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          clean: true
      - name: Check Python Version
        run: |
          # 1. Dynamic Path Discovery
          # Use the system's PYENV_ROOT if set, otherwise default to $HOME/.pyenv
          TARGET_PYENV=${PYENV_ROOT:-$HOME/.pyenv}
          
          echo "Checking for pyenv at: $TARGET_PYENV"

          if [ -d "$TARGET_PYENV" ]; then
            echo "Pyenv found. Configuring environment..."
            
            # Add bin and shims to the current PATH
            export PATH="$TARGET_PYENV/bin:$TARGET_PYENV/shims:$PATH"
            
            # Initialize and set version
            eval "$(pyenv init -)"
            pyenv shell ${{ env.PYTHON_VERSION }}
            
            # Persist for subsequent steps in the pipeline
            echo "$TARGET_PYENV/bin" >> $GITHUB_PATH
            echo "$TARGET_PYENV/shims" >> $GITHUB_PATH
          else
            echo "Pyenv NOT found at $TARGET_PYENV. Using system Python."
          fi

          # 2. Universal Version Check (Works for both Linux and macOS)
          CURRENT_VERSION=$(python3 --version)
          EXPECTED="Python ${{ env.PYTHON_VERSION }}"
          
          if [[ "$CURRENT_VERSION" != "$EXPECTED" ]]; then
            echo "------------------------------------------------"
            echo "ERROR: Version mismatch on ${{ runner.os }}!"
            echo "Expected: $EXPECTED"
            echo "Found   : $CURRENT_VERSION"
            echo "------------------------------------------------"
            exit 1
          fi
          
          echo "Success: Found $CURRENT_VERSION on ${{ runner.os }}"
      - name: Install PlatformIO Core
        run: |
          python3 -m venv .venv
          source .venv/bin/activate || source .venv/Scripts/activate
          pip install --upgrade platformio
      - name: Build ESP32S3
        run: |
          source .venv/bin/activate || source .venv/Scripts/activate
          pio run -e ESP32S3 -t clean -vvv
          pio run -e ESP32S3 -vvv
      - name: Build STM32F7
        run: |
          source .venv/bin/activate || source .venv/Scripts/activate
          pio run -e STM32F7 -t clean -vvv
          pio run -e STM32F7 -vvv